services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambulance-supervision-app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ambulance_platform
      DB_USER: ambulance_user
      DB_PASS: ambulance_pass
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ambulance-supervision-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ambulance_platform
      MYSQL_USER: ambulance_user
      MYSQL_PASSWORD: ambulance_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
